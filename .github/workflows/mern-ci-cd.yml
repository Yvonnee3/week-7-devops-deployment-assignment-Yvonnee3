name: Simple MERN CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Test Frontend
        run: |
          cd client
          npm install
          npm test
      
      - name: Test Backend
        run: |
          cd server
          npm install
          npm test
      
      - name: Build Frontend
        run: |
          cd client
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy Backend to Render
        run: |
          echo "Backend will auto-deploy via Render GitHub integration"
          
      - name: Deploy Frontend to Vercel
        run: |
          echo "Frontend will auto-deploy via Vercel GitHub integration" 